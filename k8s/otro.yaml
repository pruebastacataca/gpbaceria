apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-world-app
  labels:
    app: world-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: world-app
  template:
    metadata:
      labels:
        app: world-app
    spec:
      containers:
      - name: web-server
        image: 295934382080.dkr.ecr.us-east-1.amazonaws.com/gpbaceria:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: my-world-service
spec:
  type: LoadBalancer
  selector:
    app: world-app
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
